<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS</title>
</head>
<body>

    <h1 style="color: blue;">1. Selector Element</h1>

    <p style="font-size: 18px;">2. Selector Paragraf</p>

    <div style="background-color: lightgray; padding: 10px;">
        3. Selector Div
    </div>

    <h2 style="text-align: center;">4. Heading Selector</h2>

    <button style="background-color: green; color: white; padding: 10px;">
        5. Tombol
    </button>

    <ul>
        <li style="color: red;">6. List Item</li>
        <li style="color: orange;">7. List Item</li>
    </ul>

    <img src="https://via.placeholder.com/150"
         style="border: 5px solid black;" alt="gambar">

    <table border="1" style="margin-top: 20px; border-collapse: collapse;">
        <tr style="background-color: yellow;">
            <th>8. Nama</th>
            <th>9. Umur</th>
        </tr>
        <tr>
            <td style="padding: 5px;">Andi</td>
            <td style="padding: 5px;">20</td>
        </tr>
    </table>

    <a href="#" style="color: purple; text-decoration: none;">
    </a>

</body>
</html>
